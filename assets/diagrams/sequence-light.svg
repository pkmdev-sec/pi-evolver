<line class="lifeline" data-actor="DAE" x1="639.431" y1="70" x2="639.431" y2="913" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="U" data-to="PI" data-label="start session" data-line-style="solid" data-arrow-head="filled" data-self="false">
