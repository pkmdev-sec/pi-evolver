<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 620" role="img" aria-label="pi-evolver — AI agent memory">
<title>pi-evolver</title>
<desc>Geometric low-poly fox head in ultralight purple tones on the left, PI-EVOLVER wordmark stack on the right.</desc>
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"  stop-color="#06040E"/>
    <stop offset="50%" stop-color="#0B0818"/>
    <stop offset="100%" stop-color="#06040E"/>
  </linearGradient>

  <radialGradient id="coreGlow" cx="50%" cy="45%" r="55%">
    <stop offset="0%"  stop-color="#120820"/>
    <stop offset="100%" stop-color="#06040E"/>
