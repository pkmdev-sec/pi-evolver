<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" role="img" aria-label="pi-evolver — auto-learning daemon for the Pi coding agent">
  <title>pi-evolver</title>
  <desc>Auto-learning daemon for the Pi coding agent. A dark-gradient banner with the pi-evolver wordmark on the left, a session timeline in the middle transitioning from failures to an innovate-burst, and a subtle dotted grid on the right.</desc>

  <defs>
    <!-- Canvas gradient: deep indigo → near-black, works in both light and dark themes -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0B0F1E"/>
      <stop offset="60%"  stop-color="#0D1326"/>
      <stop offset="100%" stop-color="#10152E"/>
    </linearGradient>

    <!-- Accent gradient for the "innovate burst" — warm amber through coral -->
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#F4A261" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#E07A5F" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#E07A5F" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft cyan glow for the wordmark & timeline -->
    <linearGradient id="text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#E8F1FF"/>
      <stop offset="100%" stop-color="#B8C7E0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Dot pattern for the right-hand background -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#26304D" opacity="0.55"/>
    </pattern>

    <!-- Subtle horizontal line used for the timeline -->
    <linearGradient id="rail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2A3656" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#2A3656" stop-opacity="0.7"/>
      <stop offset="85%"  stop-color="#2A3656" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2A3656" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop-shadow-ish soft glow for the accent dots -->
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background canvas -->
  <rect width="1600" height="400" fill="url(#bg)"/>

  <!-- Right-side dot grid -->
  <rect x="900" y="0" width="700" height="400" fill="url(#dots)" opacity="0.6"/>

  <!-- Subtle vignette on the right edge -->
  <rect x="1400" y="0" width="200" height="400" fill="url(#bg)" opacity="0.5"/>

  <!-- =======================================================
       LEFT: Wordmark + tagline
       Hand-vectored geometric sans so there's no font dependency.
       "pi-" is drawn as a small glyph; the rest uses SVG <text> with
       a system-safe stack that any GitHub renderer will honor.
       ======================================================= -->

  <!-- Small "π" glyph as an icon-tick -->
  <g transform="translate(90, 120)">
    <!-- rounded square backdrop -->
    <rect x="0" y="0" width="92" height="92" rx="22" ry="22" fill="#141A32" stroke="#2A3656" stroke-width="1.5"/>
    <!-- Hand-drawn π: clean geometric strokes, no base serifs -->
    <g fill="#38BDF8">
      <!-- horizontal top bar -->
      <rect x="22" y="30" width="48" height="7"  rx="3"/>
      <!-- left leg (slight outward curl at the foot via a second smaller rect) -->
      <rect x="28" y="37" width="7"  height="29" rx="2"/>
      <!-- right leg -->
      <rect x="57" y="37" width="7"  height="29" rx="2"/>
      <!-- tiny curled foot on the right leg (classic π flourish) -->
      <path d="M 64 62 Q 70 64, 70 58" fill="none" stroke="#38BDF8" stroke-width="5" stroke-linecap="round"/>
    </g>
    <!-- subtle inner glow corner -->
    <circle cx="78" cy="14" r="3" fill="#F4A261" opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(210, 145)">
    <text x="0" y="40"
          font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif"
          font-size="72"
          font-weight="700"
          letter-spacing="-2"
          fill="url(#text)">pi-evolver</text>
    <text x="2" y="86"
          font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace"
          font-size="20"
          font-weight="400"
          letter-spacing="0.5"
          fill="#7C8AAB">auto-learning daemon for the Pi coding agent</text>
    <text x="2" y="124"
          font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif"
          font-size="16"
          font-weight="400"
          fill="#5A6781"
          font-style="italic">record · suggest · promote · never auto-rewrite</text>
  </g>

  <!-- =======================================================
       CENTER: Session timeline
       A horizontal rail with 8 session dots. The first 4 are passes
       (cyan), the next 3 are failures (coral ramp), and the 8th is a
       bright amber "innovate burst" representing the daemon detecting
       the loop and pivoting.
       ======================================================= -->

  <g transform="translate(760, 140)">
    <!-- the rail -->
    <line x1="-30" y1="0" x2="640" y2="0" stroke="url(#rail)" stroke-width="2"/>

    <!-- section label above -->
    <text x="-30" y="-24"
          font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace"
          font-size="12"
          letter-spacing="2"
          fill="#5A6781">RECENT SESSIONS  →</text>

    <!-- Passes (cyan) — s1..s4 -->
    <g fill="#38BDF8">
      <circle cx="0"   cy="0" r="8"/>
      <circle cx="80"  cy="0" r="8"/>
      <circle cx="160" cy="0" r="8"/>
      <circle cx="240" cy="0" r="8"/>
    </g>
    <!-- outcome tick labels, placed with more headroom and smaller so they read as captions -->
    <g font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="10" fill="#5A6781" text-anchor="middle">
      <text x="0"   y="32">pass</text>
      <text x="80"  y="32">pass</text>
      <text x="160" y="32">pass</text>
      <text x="240" y="32">pass</text>
    </g>

    <!-- Failures (coral ramp) — s5..s7 — slightly larger, indicating the streak -->
    <g fill="#E07A5F">
      <circle cx="320" cy="0" r="9"/>
      <circle cx="400" cy="0" r="10"/>
      <circle cx="480" cy="0" r="11"/>
    </g>
    <g font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="10" fill="#B5604A" text-anchor="middle">
      <text x="320" y="32">crash</text>
      <text x="400" y="32">crash</text>
      <text x="480" y="32">crash</text>
    </g>

    <!-- Innovate burst — s8 — big amber circle with radial glow -->
    <g transform="translate(600, 0)" filter="url(#softglow)">
      <circle r="70" fill="url(#burst)"/>
      <circle r="14" fill="#F4A261"/>
      <circle r="7"  fill="#FDF1E1"/>
    </g>
    <text x="600" y="50"
          font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace"
          font-size="11"
          letter-spacing="1.5"
          fill="#F4A261"
          text-anchor="middle"
          font-weight="600">INNOVATE</text>

    <!-- Strategy breakdown box — pushed well below the timeline with clear gap -->
    <g transform="translate(-30, 90)">
      <rect x="0" y="0" width="200" height="80" rx="10" ry="10" fill="#141A32" stroke="#2A3656" stroke-width="1"/>
      <text x="14" y="22" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="11" letter-spacing="1.5" fill="#7C8AAB">STRATEGY · AUTO</text>
      <text x="14" y="46" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="20" font-weight="700" fill="url(#text)">innovate</text>
      <text x="14" y="66" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="10" fill="#5A6781">innovate 80% · explore 5%</text>
    </g>

    <!-- Personality breakdown box -->
    <g transform="translate(420, 90)">
      <rect x="0" y="0" width="220" height="80" rx="10" ry="10" fill="#141A32" stroke="#2A3656" stroke-width="1"/>
      <text x="14" y="22" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="11" letter-spacing="1.5" fill="#7C8AAB">PERSONALITY · NUDGED</text>
      <text x="14" y="46" font-family="'SF Pro Display','Inter',system-ui,sans-serif" font-size="20" font-weight="700" fill="url(#text)">rigor <tspan fill="#38BDF8">↑</tspan></text>
      <text x="14" y="66" font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="10" fill="#5A6781">clamped to [0.10, 0.90]</text>
    </g>
  </g>

  <!-- =======================================================
       SUBTLE BRANDING FOOTER
       ======================================================= -->
  <g transform="translate(90, 360)">
    <text x="0" y="0"
          font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace"
          font-size="11"
          letter-spacing="1"
          fill="#3D4966">MIT · macOS · Node 18+ · pi-coding-agent extension</text>
  </g>

  <!-- Top-right badge -->
  <g transform="translate(1460, 40)">
    <rect x="0" y="0" width="100" height="26" rx="13" ry="13" fill="#141A32" stroke="#2A3656" stroke-width="1"/>
    <circle cx="14" cy="13" r="4" fill="#38BDF8"/>
    <text x="26" y="18"
          font-family="'SF Mono','JetBrains Mono',Menlo,Consolas,monospace"
          font-size="11"
          letter-spacing="1"
          fill="#B8C7E0">v2.0.0</text>
  </g>
</svg>
